<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e65100"/>
      <stop offset="100%" stop-color="#f57c00"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffcc80"/>
      <stop offset="100%" stop-color="#f57c00"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="50" cy="684" r="80" fill="#f57c00" opacity="0.13"/>
    <circle cx="710" cy="586" r="68" fill="#f57c00" opacity="0.06"/>
    <circle cx="322" cy="610" r="26" fill="#f57c00" opacity="0.20"/>
    <circle cx="629" cy="716" r="29" fill="#f57c00" opacity="0.17"/>
    <circle cx="388" cy="274" r="21" fill="#f57c00" opacity="0.09"/>
    <circle cx="-87" cy="334" r="60" fill="#f57c00" opacity="0.15"/>
    <rect x="808" y="2" width="69" height="83" rx="8" fill="#e65100" opacity="0.15" transform="rotate(3, 43, 179)"/>
    <rect x="893" y="175" width="95" height="62" rx="8" fill="#e65100" opacity="0.04" transform="rotate(29, -2, 640)"/>
    <rect x="597" y="29" width="95" height="22" rx="8" fill="#e65100" opacity="0.12" transform="rotate(27, 598, 241)"/>
    <rect x="1270" y="170" width="68" height="25" rx="8" fill="#e65100" opacity="0.05" transform="rotate(27, -24, 166)"/>
    <rect x="497" y="-70" width="42" height="36" rx="8" fill="#e65100" opacity="0.04" transform="rotate(36, 1155, 4)"/>
    <rect x="818" y="703" width="61" height="37" rx="8" fill="#e65100" opacity="0.11" transform="rotate(10, 756, 363)"/>
    <rect x="175" y="113" width="37" height="61" rx="8" fill="#e65100" opacity="0.12" transform="rotate(34, 647, -8)"/>
    <rect x="759" y="629" width="52" height="69" rx="8" fill="#e65100" opacity="0.04" transform="rotate(25, 447, 423)"/>
    <polygon points="941,-100 994,6 888,6" fill="#f57c00" opacity="0.05"/>
    <polygon points="581,556 631,656 531,656" fill="#f57c00" opacity="0.06"/>
    <polygon points="299,3 344,93 254,93" fill="#f57c00" opacity="0.09"/>
    <polygon points="76,580 128,684 24,684" fill="#f57c00" opacity="0.09"/>

  <!-- Wave at bottom -->
  <path d="M0,558 C360,594 840,522 1200,558 L1200,630 L0,630Z" fill="#f57c00" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
    SEO 오토파일럿 가격
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">
    마포 — 서버 웜업
  </text>

  <!-- Accent line -->
  <line x1="450" y1="355" x2="750" y2="355" stroke="#ffcc80" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 하단 CTA -->
  <rect x="440" y="385" width="320" height="40" rx="20" fill="#ffcc80" opacity="0.9"/>
  <text x="600" y="411" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="16" font-weight="600" fill="#ffffff">
    ▼ 자세히 보기
  </text>

  <!-- 상단 브랜드 -->
  <text x="60" y="55" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.6)">
    마포 SEO 오토파일럿 가격 — 서버 웜업
  </text>
</svg>